name: Release On Master

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      force_release_type:
        description: "Override auto detection"
        required: false
        type: choice
        default: auto
        options:
          - auto
          - ota
          - native
      submit_to_stores:
        description: "Auto-submit native builds to App Store / Play Store"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  detect-release:
    name: Detect Release Type
    runs-on: ubuntu-latest
    outputs:
      release_type: ${{ steps.classify.outputs.release_type }}
      should_submit: ${{ steps.classify.outputs.should_submit }}
      update_message: ${{ steps.classify.outputs.update_message }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          FORCE_RELEASE_TYPE="${{ github.event.inputs.force_release_type || 'auto' }}"
          SHOULD_SUBMIT="${{ github.event.inputs.submit_to_stores || 'false' }}"

          if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE_SHA="$(git rev-parse "${HEAD_SHA}^")"
          fi

          mapfile -t changed_files < <(git diff --name-only "${BEFORE_SHA}" "${HEAD_SHA}")

          native_changed=false
          ota_changed=false

          for file in "${changed_files[@]}"; do
            if [[ \
              "${file}" == "frontend/package.json" || \
              "${file}" == "frontend/package-lock.json" || \
              "${file}" == "frontend/app.config.ts" || \
              "${file}" == "frontend/eas.json" || \
              "${file}" == "frontend/babel.config.js" || \
              "${file}" == "frontend/metro.config.js" || \
              "${file}" == "frontend/react-native.config.js" || \
              "${file}" == frontend/android/* || \
              "${file}" == frontend/ios/* \
            ]]; then
              native_changed=true
            fi

            if [[ \
              "${file}" == "frontend/App.tsx" || \
              "${file}" == frontend/src/* || \
              "${file}" == frontend/assets/* || \
              "${file}" == "frontend/package.json" || \
              "${file}" == "frontend/package-lock.json" || \
              "${file}" == "frontend/app.config.ts" || \
              "${file}" == "frontend/babel.config.js" || \
              "${file}" == "frontend/metro.config.js" \
            ]]; then
              ota_changed=true
            fi
          done

          release_type="none"

          if [[ "${FORCE_RELEASE_TYPE}" == "ota" || "${FORCE_RELEASE_TYPE}" == "native" ]]; then
            release_type="${FORCE_RELEASE_TYPE}"
          elif [[ "${native_changed}" == "true" ]]; then
            release_type="native"
          elif [[ "${ota_changed}" == "true" ]]; then
            release_type="ota"
          fi

          app_version="$(
            sed -n 's/.*version: "\([^"]*\)".*/\1/p' frontend/app.config.ts | head -n 1
          )"
          commit_subject="$(git log -1 --pretty=%s "${HEAD_SHA}")"

          if [[ -n "${app_version}" ]]; then
            update_message="${app_version} | ${HEAD_SHA:0:7} | ${commit_subject}"
          else
            update_message="${HEAD_SHA:0:7} | ${commit_subject}"
          fi

          {
            echo "release_type=${release_type}"
            echo "should_submit=${SHOULD_SUBMIT}"
            echo "update_message=${update_message}"
          } >> "${GITHUB_OUTPUT}"

          {
            echo "### Release classification"
            echo ""
            echo "- Release type: \`${release_type}\`"
            echo "- Native-affecting changes: \`${native_changed}\`"
            echo "- OTA-eligible changes: \`${ota_changed}\`"
            echo "- Submit to stores: \`${SHOULD_SUBMIT}\`"
            echo ""
            echo "### Changed files"
            if [[ ${#changed_files[@]} -eq 0 ]]; then
              echo ""
              echo "_No changed files detected in the compared range._"
            else
              printf '\n```\n%s\n```\n' "$(printf '%s\n' "${changed_files[@]}")"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

  publish-ota:
    name: Publish Production OTA Update
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'ota'
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Publish update to production branch
        run: >
          npx eas-cli update
          --branch production
          --environment production
          --message "${{ needs.detect-release.outputs.update_message }}"
          --non-interactive

  build-native:
    name: Native Production Build
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'native'
    strategy:
      fail-fast: false
      matrix:
        platform:
          - android
          - ios
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail

          build_flags=(--platform "${{ matrix.platform }}" --profile production --non-interactive)

          if [[ "${{ needs.detect-release.outputs.should_submit }}" == "true" ]]; then
            build_flags+=(--auto-submit)
          else
            build_flags+=(--no-wait)
          fi

          npx eas-cli build "${build_flags[@]}"

      - name: Record next step
        shell: bash
        run: |
          if [[ "${{ needs.detect-release.outputs.should_submit }}" == "true" ]]; then
            echo "- \`${{ matrix.platform }}\`: build started with auto-submit enabled." >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "- \`${{ matrix.platform }}\`: build started with Expo-managed production credentials. Submit from EAS after verifying the artifact." >> "${GITHUB_STEP_SUMMARY}"
          fi

  no-release:
    name: No Release Needed
    runs-on: ubuntu-latest
    needs: detect-release
    if: needs.detect-release.outputs.release_type == 'none'
    steps:
      - name: Nothing to release
        run: echo "No frontend release-impacting changes detected."
