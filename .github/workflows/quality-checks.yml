name: Quality Checks

on:
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  advisory-typecheck:
    name: Advisory Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Summarize result
        shell: bash
        run: |
          {
            echo "### Typecheck result"
            echo ""
            if [[ "${{ steps.typecheck.outcome }}" == "failure" ]]; then
              echo "Typecheck failed. This job is advisory and does not fail the workflow."
            else
              echo "Typecheck passed."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
